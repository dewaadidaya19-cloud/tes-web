<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Builder CV ATS-Friendly</title>
<style>
  :root{
    --navy: #142033;
    --navy-2: #1f3350;
    --steel: #3E6990;
    --steel-light: #6E93B5;
    --paper: #FDFDFB;
    --panel: #F4F5F7;
    --ink: #1B2430;
    --ink-soft: #5A6472;
    --line: #DADFE5;
    --good: #2E7D4F;
    --good-bg: #E9F5EE;
    --warn: #B8860B;
    --warn-bg: #FBF3DE;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--navy);
    background-image: radial-gradient(circle at 10% 0%, var(--navy-2), var(--navy) 55%);
    min-height:100vh;
    font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink);
  }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 28px;
    color: #EDEFF3;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:30px;height:30px;border-radius:7px;
    background: linear-gradient(135deg, var(--steel), var(--steel-light));
    display:flex;align-items:center;justify-content:center;
    font-weight:700; font-size:14px; color:white;
    flex-shrink:0;
  }
  .brand h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.2px;}
  .brand span{font-size:12px; color:#A9B3C2; display:block; margin-top:1px;}

  .btn{
    border:none; border-radius: 8px; padding: 10px 18px; font-size:14px;
    font-weight:600; cursor:pointer; transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform: translateY(1px);}
  .btn-primary{
    background: linear-gradient(135deg, var(--steel-light), var(--steel));
    color:white;
    box-shadow: 0 6px 16px rgba(62,105,144,.35);
  }
  .btn-primary:hover{box-shadow: 0 8px 20px rgba(62,105,144,.5);}

  .layout{
    display:grid;
    grid-template-columns: minmax(320px, 460px) 1fr;
    gap: 22px;
    padding: 0 24px 40px;
    align-items:start;
  }
  @media (max-width: 980px){
    .layout{grid-template-columns: 1fr;}
  }

  .panel{
    background: var(--panel);
    border-radius: var(--radius);
    padding: 20px;
  }
  .form-scroll{
    max-height: calc(100vh - 110px);
    overflow-y:auto;
    padding-right: 6px;
  }
  .form-scroll::-webkit-scrollbar{width:8px;}
  .form-scroll::-webkit-scrollbar-thumb{background:#C6CCD4; border-radius:8px;}

  .section-block{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 16px 18px;
    margin-bottom: 16px;
  }
  .section-block h2{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--steel);
    margin: 0 0 12px;
    font-weight:700;
  }
  label{
    display:block; font-size:12.5px; color: var(--ink-soft);
    margin: 10px 0 4px;
    font-weight:600;
  }
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=email], input[type=tel], textarea{
    width:100%;
    border:1px solid var(--line);
    border-radius: 7px;
    padding: 9px 10px;
    font-size: 13.5px;
    font-family: inherit;
    color: var(--ink);
    background:white;
  }
  input:focus, textarea:focus{
    outline: none;
    border-color: var(--steel);
    box-shadow: 0 0 0 3px rgba(62,105,144,.15);
  }
  textarea{resize: vertical; min-height:64px; line-height:1.45;}
  .hint{font-size:11.5px; color:#8A93A0; margin-top:4px;}

  .entry-card{
    border:1px solid var(--line);
    border-radius: 8px;
    padding: 12px 12px 14px;
    margin-bottom: 12px;
    background: #FCFCFB;
    position:relative;
  }
  .entry-card .remove-btn{
    position:absolute; top:8px; right:8px;
    background:none; border:none; color:#B4483F;
    font-size:12px; cursor:pointer; font-weight:600;
  }
  .add-btn{
    width:100%;
    border:1.5px dashed var(--steel-light);
    background: transparent;
    color: var(--steel);
    border-radius: 8px;
    padding: 9px;
    font-size: 13px;
    font-weight:600;
    cursor:pointer;
  }
  .add-btn:hover{ background: #EAF1F6; }

  /* ATS checklist */
  .ats-panel{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .ats-panel h2{
    font-size: 13px; text-transform:uppercase; letter-spacing:.08em;
    color: var(--steel); margin:0 0 4px; font-weight:700;
  }
  .ats-panel .sub{font-size:11.5px; color:var(--ink-soft); margin-bottom:12px;}
  .ats-item{
    display:flex; align-items:flex-start; gap:8px;
    font-size:12.8px; padding:6px 0; border-top:1px solid #EEF0F3;
  }
  .ats-item:first-of-type{border-top:none;}
  .ats-dot{
    width:16px;height:16px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:10px; color:white; margin-top:1px;
  }
  .ats-dot.ok{background:var(--good);}
  .ats-dot.pending{background:#C7CCD3;}

  /* Preview column */
  .preview-wrap{ position:sticky; top:16px; }
  .preview-toolbar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:12px;
  }
  .preview-toolbar .label{color:#EDEFF3; font-size:13px; font-weight:600;}

  .paper{
    background:white;
    width: 100%;
    max-width: 794px;
    min-height: 1000px;
    margin: 0 auto;
    padding: 40px 52px;
    box-shadow: 0 20px 45px rgba(0,0,0,.35);
    border-radius: 3px;
    font-family: 'Calibri', 'Arial', sans-serif;
    color: #1A1A1A;
    font-size: 13.5px;
    line-height: 1.35;
  }
  .cv-name{
    font-size: 21px; font-weight:700; letter-spacing:.2px; margin:0 0 2px;
    text-align:center;
  }
  .cv-contact{
    text-align:center; font-size:12.5px; color:#333; margin-bottom:10px;
  }
  .cv-summary{ margin-bottom: 12px; text-align: justify; }
  .cv-h2{
    font-size: 13.5px; font-weight:700; text-transform:uppercase;
    letter-spacing:.04em;
    border-bottom: 1.4px solid #1A1A1A;
    padding-bottom: 2px;
    margin: 0 0 6px;
  }
  .cv-section{ margin-bottom: 12px; }
  .cv-entry{ margin-bottom: 6px; }
  .cv-entry:last-child{ margin-bottom:0; }
  .cv-entry-title{ font-weight:700; }
  .cv-entry-meta{ font-size:12.5px; color:#333; margin-bottom:1px; }
  .cv-entry ul{ margin: 2px 0 0; padding-left: 18px; }
  .cv-entry ul li{ margin-bottom: 0px; }
  .cv-skills ul{ margin:0; padding-left:18px; }
  .cv-skills li{ margin-bottom:1px; }
  .cv-empty{ color:#999; font-style:italic; }

  @media print{
    body{ background:white; }
    .topbar, .layout > .panel:first-child, .ats-panel, .preview-toolbar{ display:none !important; }
    .layout{ display:block; padding:0; }
    .preview-wrap{ position:static; }
    .paper{
      box-shadow:none; margin:0; padding:14mm 16mm; max-width:none;
      width:100%; min-height:0;
    }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">CV</div>
    <div>
      <h1>Builder CV ATS-Friendly</h1>
      <span>Isi form, lihat preview, lalu unduh sebagai PDF</span>
    </div>
  </div>
  <button class="btn btn-primary" onclick="window.print()">Unduh PDF</button>
</div>

<div class="layout">

  <!-- FORM PANEL -->
  <div class="panel">
    <div class="form-scroll">

      <div class="section-block">
        <h2>Data Diri</h2>
        <label>Nama Lengkap</label>
        <input type="text" id="f-name" oninput="render()" />

        <label>Domisili (Kota, Provinsi)</label>
        <input type="text" id="f-city" oninput="render()" />

        <label>Email</label>
        <input type="email" id="f-email" oninput="render()" />

        <label>No. HP</label>
        <input type="tel" id="f-phone" oninput="render()" />

        <label>LinkedIn / Portofolio <span class="hint">(opsional)</span></label>
        <input type="text" id="f-link" oninput="render()" placeholder="linkedin.com/in/username" />
      </div>

      <div class="section-block">
        <h2>Ringkasan Profil</h2>
        <label>2–4 kalimat tentang dirimu, keahlian, dan tujuan karier</label>
        <textarea id="f-summary" oninput="render()" style="min-height:100px"></textarea>
      </div>

      <div class="section-block">
        <h2>Pengalaman</h2>
        <div id="exp-list"></div>
        <button class="add-btn" onclick="addExperience()">+ Tambah Pengalaman</button>
      </div>

      <div class="section-block">
        <h2>Pendidikan</h2>
        <div id="edu-list"></div>
        <button class="add-btn" onclick="addEducation()">+ Tambah Pendidikan</button>
      </div>

      <div class="section-block">
        <h2>Skill</h2>
        <label>Satu skill per baris</label>
        <textarea id="f-skills" oninput="render()" style="min-height:100px"></textarea>
      </div>

    </div>
  </div>

  <!-- PREVIEW + ATS PANEL -->
  <div>
    <div class="preview-wrap">
      <div class="preview-toolbar">
        <span class="label">Preview CV</span>
      </div>
      <div class="paper" id="cv-preview"></div>

      <div style="height:16px"></div>

      <div class="ats-panel">
        <h2>Cek ATS-Friendly</h2>
        <div class="sub">Status otomatis berdasarkan isi CV kamu</div>
        <div id="ats-list"></div>
      </div>
    </div>
  </div>

</div>

<script>
  let state = {
    experience: [],
    education: []
  };

  function addExperience(data){
    state.experience.push(data || { title:'', place:'', period:'', bullets:'' });
    renderExperienceForm();
    render();
  }
  function removeExperience(i){
    state.experience.splice(i,1);
    renderExperienceForm();
    render();
  }
  function addEducation(data){
    state.education.push(data || { school:'', degree:'', period:'', extra:'' });
    renderEducationForm();
    render();
  }
  function removeEducation(i){
    state.education.splice(i,1);
    renderEducationForm();
    render();
  }

  function renderExperienceForm(){
    const el = document.getElementById('exp-list');
    el.innerHTML = state.experience.map((exp, i) => `
      <div class="entry-card">
        <button class="remove-btn" onclick="removeExperience(${i})">Hapus</button>
        <label>Jabatan</label>
        <input type="text" value="${escapeAttr(exp.title)}" oninput="state.experience[${i}].title=this.value; render()" />
        <label>Tempat / Perusahaan</label>
        <input type="text" value="${escapeAttr(exp.place)}" oninput="state.experience[${i}].place=this.value; render()" />
        <label>Periode</label>
        <input type="text" value="${escapeAttr(exp.period)}" oninput="state.experience[${i}].period=this.value; render()" placeholder="Juni 2019 – Sekarang" />
        <label>Uraian tugas <span class="hint">(satu poin per baris)</span></label>
        <textarea oninput="state.experience[${i}].bullets=this.value; render()">${escapeHtml(exp.bullets)}</textarea>
      </div>
    `).join('');
  }

  function renderEducationForm(){
    const el = document.getElementById('edu-list');
    el.innerHTML = state.education.map((edu, i) => `
      <div class="entry-card">
        <button class="remove-btn" onclick="removeEducation(${i})">Hapus</button>
        <label>Institusi</label>
        <input type="text" value="${escapeAttr(edu.school)}" oninput="state.education[${i}].school=this.value; render()" />
        <label>Jenjang / Jurusan</label>
        <input type="text" value="${escapeAttr(edu.degree)}" oninput="state.education[${i}].degree=this.value; render()" />
        <label>Periode</label>
        <input type="text" value="${escapeAttr(edu.period)}" oninput="state.education[${i}].period=this.value; render()" placeholder="2024 – Sekarang" />
        <label>Info tambahan <span class="hint">(IPK, dsb — opsional)</span></label>
        <input type="text" value="${escapeAttr(edu.extra)}" oninput="state.education[${i}].extra=this.value; render()" />
      </div>
    `).join('');
  }

  function escapeHtml(str){
    return (str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  function bulletsToLis(text){
    return (text || '')
      .split('\n')
      .map(s => s.trim())
      .filter(Boolean)
      .map(s => `<li>${escapeHtml(s)}</li>`)
      .join('');
  }

  function render(){
    const name = document.getElementById('f-name').value.trim();
    const city = document.getElementById('f-city').value.trim();
    const email = document.getElementById('f-email').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const link = document.getElementById('f-link').value.trim();
    const summary = document.getElementById('f-summary').value.trim();
    const skillsRaw = document.getElementById('f-skills').value;

    const contactParts = [city, email, phone, link].filter(Boolean);

    let html = '';
    html += `<div class="cv-name">${escapeHtml(name) || '<span class="cv-empty">Nama Lengkap</span>'}</div>`;
    html += `<div class="cv-contact">${contactParts.length ? contactParts.map(escapeHtml).join(' | ') : '<span class="cv-empty">Kota | Email | No. HP</span>'}</div>`;

    if(summary){
      html += `<div class="cv-summary">${escapeHtml(summary)}</div>`;
    }

    // Experience
    if(state.experience.length){
      html += `<div class="cv-section"><div class="cv-h2">Pengalaman</div>`;
      state.experience.forEach(exp => {
        html += `<div class="cv-entry">
          <div class="cv-entry-title">${escapeHtml(exp.title) || '&nbsp;'}${exp.place ? ' — ' + escapeHtml(exp.place) : ''}</div>
          <div class="cv-entry-meta">${escapeHtml(exp.period)}</div>
          <ul>${bulletsToLis(exp.bullets)}</ul>
        </div>`;
      });
      html += `</div>`;
    }

    // Education
    if(state.education.length){
      html += `<div class="cv-section"><div class="cv-h2">Pendidikan</div>`;
      state.education.forEach(edu => {
        html += `<div class="cv-entry">
          <div class="cv-entry-title">${escapeHtml(edu.school) || '&nbsp;'}</div>
          <div class="cv-entry-meta">${escapeHtml(edu.degree)}${edu.degree && edu.period ? ' | ' : ''}${escapeHtml(edu.period)}</div>
          ${edu.extra ? `<div>${escapeHtml(edu.extra)}</div>` : ''}
        </div>`;
      });
      html += `</div>`;
    }

    // Skills
    const skills = skillsRaw.split('\n').map(s=>s.trim()).filter(Boolean);
    if(skills.length){
      html += `<div class="cv-section"><div class="cv-h2">Skill</div>
        <div class="cv-skills"><ul>${skills.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul></div>
      </div>`;
    }

    document.getElementById('cv-preview').innerHTML = html;

    renderAtsChecklist({name, contactParts, summary, experienceCount: state.experience.length, educationCount: state.education.length, skillsCount: skills.length});
  }

  function renderAtsChecklist(d){
    const checks = [
      { ok: !!d.name, label: 'Nama lengkap terisi' },
      { ok: d.contactParts.length >= 2, label: 'Info kontak lengkap (min. email & HP)' },
      { ok: d.summary.length > 30, label: 'Ringkasan profil terisi' },
      { ok: d.experienceCount > 0, label: 'Minimal 1 pengalaman ditambahkan' },
      { ok: d.educationCount > 0, label: 'Minimal 1 riwayat pendidikan ditambahkan' },
      { ok: d.skillsCount > 0, label: 'Skill terisi' },
      { ok: true, label: 'Format satu kolom, tanpa tabel/gambar (otomatis)' },
      { ok: true, label: 'Font standar & judul section jelas (otomatis)' },
    ];
    document.getElementById('ats-list').innerHTML = checks.map(c => `
      <div class="ats-item">
        <div class="ats-dot ${c.ok ? 'ok' : 'pending'}">${c.ok ? '✓' : ''}</div>
        <div>${c.label}</div>
      </div>
    `).join('');
  }

  // Prefill dengan contoh data (bisa diedit/dihapus bebas)
  document.getElementById('f-name').value = 'Nama Lengkap Kamu';
  document.getElementById('f-city').value = 'Jakarta, Indonesia';
  document.getElementById('f-email').value = 'emailkamu@gmail.com';
  document.getElementById('f-phone').value = '+62 12345678910';
  document.getElementById('f-summary').value = 'Jelaskan tentang diri kamu, ex: saya adalah seorang mahasiswa di kampus ......';
  document.getElementById('f-skills').value = 'Tulis skill kamu disini';

  addExperience({
    title: 'Tambah pengalaman kamu!',
    place: '',
    period: 'Juni 2020 – Sekarang',
    bullets: 'Deskripsikan pengalaman kamu disini'
  });
  addExperience({
    title: 'Tambah pengalaman kamu!',
    place: 'additional, ex : tempat',
    period: 'November 2020',
    bullets: 'Deskripsikan pengalaman kamu disini'
  });

  addEducation({
    school: 'Universitas ......',
    degree: 'Jurusan kamu!',
    period: '2020 – Sekarang (tahun mulai-selesai)',
    extra: 'IPK: x.xx'
  });

  render();
</script>

</body>
</html>
